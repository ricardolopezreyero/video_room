<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tu monedero — Video Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body class="app-shell">
<nav class="nav">
  <a href="/" class="logo"><img src="https://assets.cdn.filesafe.space/E6Gh1sE1RnPtadmL7wmG/media/698e530bc08665d629146a14.png" alt="SuperLeads" style="height:22px"><span>Video Room</span></a>
  <div class="links">
    <a href="/">Inicio</a>
    <a href="/estadisticas">Estadísticas</a>
  </div>
  <div style="display:flex; align-items:center; gap:14px;">
    <div class="bell-wrap" id="bell-wrap" style="display:none;">
      <button class="icon-btn" id="btn-bell" title="Notificaciones" aria-label="Notificaciones">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <span class="bell-badge" id="bell-badge"></span>
      </button>
      <div class="bell-dropdown" id="bell-dropdown"></div>
    </div>
    <div class="user-chip" id="user-chip" style="display:none;">
      <img class="user-avatar" id="user-avatar" src="" alt="" onerror="this.style.visibility='hidden'">
      <span class="user-name" id="user-name"></span>
      <button class="icon-btn" id="btn-logout" title="Cerrar sesión" aria-label="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
      </button>
    </div>
  </div>
</nav>
<div class="app-wrap" id="app">
  <h1>Tu monedero</h1>
  <div id="content">Cargando…</div>
</div>
<div class="app-toast" id="app-toast"></div>
<script>
function showToast(msg, ms) {
  const el = document.getElementById('app-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms || 3200);
}

function animateBalance(el, fromCents, toCents, duration) {
  duration = duration || 1000;
  const start = performance.now();
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    const val = Math.round((fromCents + (toCents - fromCents) * eased) / 100);
    el.textContent = '$' + val.toLocaleString('es-MX');
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = '$' + Math.round(toCents / 100).toLocaleString('es-MX');
  }
  requestAnimationFrame(tick);
}

async function main() {
  const params = new URLSearchParams(location.search);
  const recarga = params.get('recarga');
  if (recarga) history.replaceState(null, '', '/monedero');

  const res = await fetch('/api/wallet/me');
  const content = document.getElementById('content');
  if (!res.ok) {
    content.innerHTML = '<p class="muted">Necesitas ingresar.</p><a href="/login"><button class="btn-primary">Ingresar con Google</button></a>';
    return;
  }
  const me = await res.json();

  document.getElementById('user-avatar').src = me.avatar_url || '';
  document.getElementById('user-name').textContent = me.name || '';
  document.getElementById('user-chip').style.display = 'flex';
  document.getElementById('btn-logout').onclick = () => { window.location.href = '/auth/logout'; };

  content.innerHTML = `
    <div class="balance-box">
      <div class="label">Tu saldo</div>
      <div class="amount" id="balance-amount">$${(me.balance_cents/100).toFixed(0)}</div>
      <div class="amount-grid">
        <button data-amt="2000">$20</button>
        <button data-amt="5000" class="featured">$50</button>
        <button data-amt="10000">$100</button>
        <button data-amt="50000">$500</button>
        <button data-amt="100000">$1,000</button>
        <button data-amt="200000">$2,000</button>
      </div>
      <p class="muted">Tu saldo sirve para entrar a salas y mandar dinero a creadores.</p>
    </div>
    <div class="balance-box">
      <div class="label">Balance de creador (separado — esto es lo que has ganado)</div>
      <div class="amount green">$${(me.creator_balance_cents/100).toFixed(0)}</div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;">
        <button class="btn-navy" id="btn-retiro">Retirar a mi banco</button>
        <a href="/estadisticas"><button class="btn-ghost">Ver mis estadísticas</button></a>
      </div>
      <p class="muted" style="margin-top:12px;">Mínimo $200, llega en 1-2 días hábiles. Cada recarga, entrada, propina y retiro queda guardado para siempre — nada se borra.</p>
    </div>
    <div class="balance-box">
      <div class="label">Tu sala</div>
      <div id="room-info">Cargando…</div>
    </div>
  `;

  // Venimos de Stripe: animamos el saldo subiendo del valor de antes al de ahora.
  if (recarga === 'ok') {
    const before = Number(localStorage.getItem('vr_balance_before') || me.balance_cents);
    localStorage.removeItem('vr_balance_before');
    animateBalance(document.getElementById('balance-amount'), before, me.balance_cents);
    showToast('✅ Recarga exitosa.');
  } else if (recarga === 'cancelada') {
    localStorage.removeItem('vr_balance_before');
    showToast('Recarga cancelada.');
  }

  loadRoom(params.get('bienvenida') === '1');

  content.querySelectorAll('[data-amt]').forEach((btn) => {
    btn.onclick = async () => {
      if (btn.disabled) return;
      btn.disabled = true;
      localStorage.setItem('vr_balance_before', String(me.balance_cents));
      const r = await fetch('/api/wallet/checkout', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ amount_cents: Number(btn.dataset.amt) }) });
      const j = await r.json();
      if (j.url) { window.location.href = j.url; return; }
      localStorage.removeItem('vr_balance_before');
      btn.disabled = false;
      alert('No se pudo iniciar el pago. Intenta de nuevo.');
    };
  });
  const btnRetiro = document.getElementById('btn-retiro');
  btnRetiro.onclick = async () => {
    if (btnRetiro.disabled) return;
    btnRetiro.disabled = true;
    const r = await fetch('/api/wallet/retiro', { method: 'POST' });
    const j = await r.json();
    if (j.error === 'minimo_200') alert('Necesitas al menos $200 en tu balance de creador.');
    else if (j.ok) { alert('Retiro solicitado. Llega en 1-2 días hábiles.'); main(); return; }
    else alert('No se pudo procesar el retiro. Intenta de nuevo.');
    btnRetiro.disabled = false;
  };
}

async function loadRoom(autoCopy) {
  const el = document.getElementById('room-info');
  const res = await fetch('/api/rooms/mine');
  if (!res.ok) { el.innerHTML = '<p class="muted">No se pudo cargar tu sala.</p>'; return; }
  const room = await res.json();
  renderRoom(room);
  if (autoCopy) {
    const fullUrl = 'https://videoroom.superleads.mx/r/' + room.slug;
    navigator.clipboard.writeText(fullUrl).then(() => {
      showToast('🔗 Tu link ya está copiado — compártelo cuando quieras.', 4500);
    }).catch(() => {
      // algunos navegadores bloquean el copiado automático; el botón "Copiar link" sigue disponible.
    });
  }
}

function renderRoom(room) {
  const el = document.getElementById('room-info');
  const url = 'videoroom.superleads.mx/r/' + room.slug;
  const ageMsg = room.age_days <= 0
    ? 'La acabas de recibir.'
    : `La tienes desde hace ${room.age_days} día${room.age_days === 1 ? '' : 's'}.`;
  const numericMsg = room.is_numeric
    ? ` Es una URL numérica — entre más antigua, más vale conservarla.`
    : '';
  el.innerHTML = `
    <div class="amount" style="font-size:20px;">${url}</div>
    <p class="muted">${ageMsg}${numericMsg}</p>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
      <a href="/r/${room.slug}"><button class="btn-primary">🔴 Transmitir en vivo</button></a>
      <button class="btn-ghost" id="btn-copy-link">Copiar link</button>
      <button class="btn-ghost" id="btn-edit-slug">Editar URL</button>
    </div>
    <div id="edit-slug-form" style="display:none; margin-top:14px;">
      <input id="new-slug-input" placeholder="mi-nombre-de-sala" style="width:100%; padding:12px; border-radius:10px; border:.5px solid rgba(255,255,255,.15); background:rgba(255,255,255,.04); color:#fff; margin-bottom:8px; box-sizing:border-box;">
      <div style="display:flex; gap:10px;">
        <button class="btn-navy" id="btn-save-slug">Guardar</button>
        <button class="btn-ghost" id="btn-cancel-slug">Cancelar</button>
      </div>
    </div>
    <div style="margin-top:22px; padding-top:20px; border-top:.5px solid rgba(255,255,255,.08);">
      <div class="label">Avisar que ya casi empiezas</div>
      <p class="muted" style="margin:4px 0 12px;">
        Tienes <strong style="color:#fff;">${room.notify_count}</strong> persona${room.notify_count === 1 ? '' : 's'} esperando que le${room.notify_count === 1 ? '' : 's'} avises.
      </p>
      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <input id="starting-minutes" type="number" min="1" max="1440" value="60" inputmode="numeric"
          style="width:90px; padding:12px; border-radius:10px; border:.5px solid rgba(255,255,255,.15); background:rgba(255,255,255,.04); color:#fff; box-sizing:border-box;">
        <span class="muted">minutos</span>
        <button class="btn-primary" id="btn-notify-starting">Avisar que empiezo</button>
      </div>
    </div>
  `;

  document.getElementById('btn-copy-link').onclick = () => {
    navigator.clipboard.writeText('https://' + url);
    showToast('Link copiado.');
  };
  document.getElementById('btn-edit-slug').onclick = () => {
    document.getElementById('edit-slug-form').style.display = 'block';
  };
  document.getElementById('btn-cancel-slug').onclick = () => {
    document.getElementById('edit-slug-form').style.display = 'none';
  };
  const btnSaveSlug = document.getElementById('btn-save-slug');
  btnSaveSlug.onclick = async () => {
    if (btnSaveSlug.disabled) return;
    const newSlug = document.getElementById('new-slug-input').value.trim();
    if (!newSlug) return;
    const warning = room.is_numeric
      ? `Vas a cambiar tu URL numérica "${room.slug}" (la tienes desde hace ${room.age_days} día${room.age_days === 1 ? '' : 's'}) por una personalizada. El número "${room.slug}" quedará libre para que lo tome otro usuario nuevo. ¿Continuar?`
      : `Vas a cambiar tu URL actual "${room.slug}" por "${newSlug}". ¿Continuar?`;
    if (!confirm(warning)) return;
    btnSaveSlug.disabled = true;
    const r = await fetch(`/api/rooms/${room.slug}/rename`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_slug: newSlug }),
    });
    const j = await r.json();
    btnSaveSlug.disabled = false;
    if (j.error === 'slug_ocupado') return alert('Esa URL ya está en uso, prueba con otra.');
    if (j.error === 'slug_numerico_reservado') return alert('Las URLs numéricas las asigna el sistema, elige un nombre con letras.');
    if (j.error === 'slug_invalido') return alert('Ese nombre no es válido.');
    if (j.error) return alert('No se pudo cambiar la URL.');
    loadRoom(false);
  };

  const btnNotifyStarting = document.getElementById('btn-notify-starting');
  btnNotifyStarting.onclick = async () => {
    if (btnNotifyStarting.disabled) return;
    const minutes = parseInt(document.getElementById('starting-minutes').value, 10);
    if (!Number.isInteger(minutes) || minutes < 1 || minutes > 1440) {
      alert('Pon un número de minutos válido (1 a 1440).');
      return;
    }
    if (room.notify_count === 0) {
      alert('Todavía nadie te ha pedido que le avises. Comparte tu link para que la gente active "Avísame cuando abra".');
      return;
    }
    btnNotifyStarting.disabled = true;
    const r = await fetch(`/api/rooms/${room.slug}/notify-starting`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ minutes }),
    });
    const j = await r.json();
    btnNotifyStarting.disabled = false;
    if (j.ok) showToast(`✅ Avisamos a ${j.count} persona${j.count === 1 ? '' : 's'} que empiezas en ${minutes} min.`, 5000);
    else alert('No se pudo enviar el aviso.');
  };
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

let notifData = { unread_count: 0, items: [] };

async function loadNotifications() {
  const res = await fetch('/api/notifications');
  if (!res.ok) return;
  notifData = await res.json();
  document.getElementById('bell-wrap').style.display = 'flex';
  document.getElementById('bell-badge').classList.toggle('show', notifData.unread_count > 0);
}

function renderNotifDropdown() {
  const el = document.getElementById('bell-dropdown');
  if (!notifData.items.length) {
    el.innerHTML = '<div class="bell-empty">Aquí van a aparecer avisos cuando las salas que sigues se pongan en vivo.</div>';
    return;
  }
  el.innerHTML = notifData.items.map((n) => `
    <a class="bell-item" href="/r/${encodeURIComponent(n.room_slug)}">
      <div class="t">${escapeHtml(n.title)}</div>
      <div class="b">${escapeHtml(n.body)}</div>
    </a>`).join('');
}

document.getElementById('btn-bell').onclick = async () => {
  const dropdown = document.getElementById('bell-dropdown');
  if (dropdown.classList.contains('show')) { dropdown.classList.remove('show'); return; }
  renderNotifDropdown();
  dropdown.classList.add('show');
  if (notifData.unread_count > 0) {
    await fetch('/api/notifications/read', { method: 'POST' });
    document.getElementById('bell-badge').classList.remove('show');
    notifData.unread_count = 0;
  }
};

loadNotifications();
setInterval(loadNotifications, 30000);

main();
</script>
</body>
</html>
