<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tus estadísticas — Video Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<link rel="icon" href="/og-default.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css">
</head>
<body class="app-shell">
<nav class="nav">
  <a class="logo" href="/"><span>Video Room</span></a>
  <div style="display:flex; align-items:center; gap:10px;">
    <button class="icon-btn" id="btn-copy-link-nav" title="Copiar link de tu sala" aria-label="Copiar link de tu sala" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
    </button>
    <a href="#" id="btn-transmit-nav" style="display:none;"><button class="btn-primary nav-cta">🔴 Transmitir</button></a>
    <div class="bell-wrap" id="bell-wrap" style="display:none;">
      <button class="icon-btn" id="btn-bell" title="Notificaciones" aria-label="Notificaciones">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <span class="bell-badge" id="bell-badge"></span>
      </button>
      <div class="bell-dropdown" id="bell-dropdown"></div>
    </div>
    <div class="user-chip" id="user-chip" style="display:none;">
      <img class="user-avatar" id="user-avatar" src="" alt="" onerror="this.style.visibility='hidden'">
      <span class="user-name" id="user-name"></span>
      <button class="icon-btn" id="btn-logout" title="Cerrar sesión" aria-label="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
      </button>
    </div>
  </div>
</nav>
<div class="app-subnav">
  <a href="/">Inicio</a>
  <a href="/app/monedero">Monedero</a>
  <a href="/app/transacciones">Transacciones</a>
  <a href="/app/faq">FAQ</a>
</div>
<div class="app-wrap" id="app">
  <h1>Tus números</h1>
  <div id="content">Cargando…</div>
</div>
<div class="app-toast" id="app-toast"></div>
<script>
function showToast(msg, ms) {
  const el = document.getElementById('app-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms || 3200);
}

const RANGE_LABELS = { today: 'Hoy', '7d': '7 días', '30d': '30 días', all: 'Todo' };
let currentRange = '30d';
let viewMode = 'vivo'; // 'demo' | 'vivo'
let lastData = null;
let autoDecided = false;

const DEMO_DATA = {
  has_room: true,
  room_slug: 'tu-sala',
  balance_cents: 0,
  creator_balance_cents: 92000,
  total_earned_all_time_cents: 184000,
  period: { earned_cents: 184000, entradas_count: 47, unique_viewers: 38, propinas_count: 12, propinas_cents: 45000 },
  top_donors: [
    { name: 'María', avatar_url: null, total_cents: 52000, entradas: 3, propinas: 2 },
    { name: 'Juan', avatar_url: null, total_cents: 31000, entradas: 2, propinas: 1 },
    { name: 'Ana', avatar_url: null, total_cents: 18000, entradas: 1, propinas: 1 },
  ],
  campaigns: [
    { utm_source: 'instagram', utm_campaign: 'lanzamiento', entradas: 22, ganado_cents: 22000 },
    { utm_source: 'whatsapp', utm_campaign: '', entradas: 15, ganado_cents: 15000 },
    { utm_source: '(directo)', utm_campaign: '', entradas: 10, ganado_cents: 10000 },
  ],
};

function fmt(cents) { return '$' + Math.round((cents || 0) / 100).toLocaleString('es-MX'); }

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

function isEmptyData(data) {
  return data.period.earned_cents === 0 && data.top_donors.length === 0 && (!data.campaigns || data.campaigns.length === 0);
}

async function load() {
  const content = document.getElementById('content');
  const res = await fetch('/api/stats?range=' + currentRange);
  if (res.status === 401) {
    content.innerHTML = '<p class="muted">Necesitas ingresar.</p><a href="/login"><button class="btn-primary">Ingresar con Google</button></a>';
    return;
  }
  const data = await res.json();

  if (!data.has_room) {
    content.innerHTML = `
      <div class="empty-state">
        No encontramos tu sala. Ve a tu <a href="/app/monedero" style="color:var(--green)">monedero</a> — si el problema sigue, escríbenos.
      </div>`;
    return;
  }

  lastData = data;
  setupNavShortcuts(data.room_slug);
  // Solo la primera vez: si no hay actividad real todavía, arrancamos en Demo
  // para que la persona vea cómo se ve su panel con movimiento, no puros ceros.
  // Después de esa primera decisión, respetamos lo que la persona elija.
  if (!autoDecided) {
    viewMode = isEmptyData(data) ? 'demo' : 'vivo';
    autoDecided = true;
  }
  render();
}

function render() {
  const content = document.getElementById('content');
  const data = viewMode === 'demo' ? DEMO_DATA : lastData;

  const pills = Object.keys(RANGE_LABELS).map((key) =>
    `<button data-range="${key}" class="${key === currentRange ? 'active' : ''}">${RANGE_LABELS[key]}</button>`
  ).join('');

  const donorsHtml = data.top_donors.length
    ? `<ul class="donor-list">${data.top_donors.map((d, i) => `
        <li class="donor-row">
          <div class="donor-rank">${i + 1}</div>
          ${d.avatar_url ? `<img class="donor-avatar" src="${escapeHtml(d.avatar_url)}">` : `<div class="donor-avatar"></div>`}
          <div class="donor-info">
            <div class="donor-name">${escapeHtml(d.name)}</div>
            <div class="donor-meta">${d.entradas} entrada${d.entradas === 1 ? '' : 's'} · ${d.propinas} propina${d.propinas === 1 ? '' : 's'}</div>
          </div>
          <div class="donor-total">${fmt(d.total_cents)}</div>
          ${d.user_id ? `<button class="btn-ghost btn-block-viewer" data-user-id="${escapeHtml(d.user_id)}" style="padding:6px 10px; font-size:11px; margin-left:8px;">Bloquear</button>` : ''}
        </li>`).join('')}</ul>`
    : `<div class="empty-state">Todavía no hay donadores en este periodo. En cuanto alguien entre o te mande dinero, aparece aquí.</div>`;

  const campaignsHtml = data.campaigns && data.campaigns.length
    ? `<ul class="donor-list">${data.campaigns.map((cmp) => `
        <li class="donor-row">
          <div class="donor-info">
            <div class="donor-name">${escapeHtml(cmp.utm_source)}${cmp.utm_campaign ? ' · ' + escapeHtml(cmp.utm_campaign) : ''}</div>
            <div class="donor-meta">${cmp.entradas} entrada${cmp.entradas === 1 ? '' : 's'}</div>
          </div>
          <div class="donor-total">${fmt(cmp.ganado_cents)}</div>
        </li>`).join('')}</ul>`
    : `<div class="empty-state">Comparte tu link con <code>?utm_source=instagram&amp;utm_campaign=lanzamiento</code> (o la campaña que uses) y aquí vas a ver cuánta gente entró por cada una.</div>`;

  content.innerHTML = `
    <p class="muted">Sala: videoroom.live/${escapeHtml(data.room_slug)}</p>
    <div class="filter-pills" id="view-pills" style="margin-bottom:0;">
      <button data-view="demo" class="${viewMode === 'demo' ? 'active' : ''}">Demo</button>
      <button data-view="vivo" class="${viewMode === 'vivo' ? 'active' : ''}">En vivo</button>
    </div>
    ${viewMode === 'demo' ? '<p class="muted" style="color:var(--green);">📊 Estos son números de ejemplo para que veas cómo se ve tu panel con actividad. Cambia a "En vivo" para ver los tuyos reales.</p>' : ''}
    <div class="filter-pills" id="pills">${pills}</div>

    <div class="stat-grid">
      <div class="stat-card"><div class="n green">${fmt(data.period.earned_cents)}</div><div class="l">Ganado en este periodo</div></div>
      <div class="stat-card"><div class="n">${data.period.entradas_count}</div><div class="l">Entradas pagadas</div></div>
      <div class="stat-card"><div class="n">${data.period.propinas_count}</div><div class="l">Propinas (${fmt(data.period.propinas_cents)})</div></div>
      <div class="stat-card"><div class="n">${data.period.unique_viewers}</div><div class="l">Espectadores únicos</div></div>
    </div>

    <div class="balance-box">
      <div class="label">Balance disponible para retirar</div>
      <div class="amount green">${fmt(data.creator_balance_cents)}</div>
      <div class="label" style="margin-top:14px;">Ganado histórico (desde siempre)</div>
      <div class="amount" style="font-size:20px;">${fmt(data.total_earned_all_time_cents)}</div>
    </div>

    <h2 style="font-size:18px; margin-top:32px; margin-bottom:8px;">Tus mayores donadores</h2>
    <p class="muted" style="margin-bottom:8px;">Quién te ha apoyado más en este periodo, sumando entradas y propinas.</p>
    <div class="balance-box">${donorsHtml}</div>

    <h2 style="font-size:18px; margin-top:32px; margin-bottom:8px;">Por campaña (UTM)</h2>
    <p class="muted" style="margin-bottom:8px;">De dónde vinieron las personas que entraron a tu sala en este periodo.</p>
    <div class="balance-box">${campaignsHtml}</div>
  `;

  document.querySelectorAll('#pills button').forEach((btn) => {
    btn.onclick = () => { currentRange = btn.dataset.range; load(); };
  });
  document.querySelectorAll('#view-pills button').forEach((btn) => {
    btn.onclick = () => { viewMode = btn.dataset.view; render(); };
  });
  document.querySelectorAll('.btn-block-viewer').forEach((btn) => {
    btn.onclick = async () => {
      if (btn.disabled) return;
      if (!confirm('¿Bloquear a esta persona? Ya no va a poder entrar a tu sala ni ver la transmisión.')) return;
      btn.disabled = true;
      const r = await fetch(`/api/rooms/${data.room_slug}/block`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: btn.dataset.userId }),
      });
      const j = await r.json();
      if (j.ok) { btn.closest('.donor-row').style.opacity = '.4'; btn.textContent = 'Bloqueado ✓'; }
      else { alert('No se pudo bloquear.'); btn.disabled = false; }
    };
  });
}

async function loadUserChip() {
  const res = await fetch('/api/wallet/me');
  if (!res.ok) return;
  const me = await res.json();
  document.getElementById('user-avatar').src = me.avatar_url || '';
  document.getElementById('user-name').textContent = me.name || '';
  document.getElementById('user-chip').style.display = 'flex';
  document.getElementById('btn-logout').onclick = () => { window.location.href = '/auth/logout'; };
}

let notifData = { unread_count: 0, items: [] };

async function loadNotifications() {
  const res = await fetch('/api/notifications');
  if (!res.ok) return;
  notifData = await res.json();
  document.getElementById('bell-wrap').style.display = 'flex';
  document.getElementById('bell-badge').classList.toggle('show', notifData.unread_count > 0);
}

function renderNotifDropdown() {
  const el = document.getElementById('bell-dropdown');
  if (!notifData.items.length) {
    el.innerHTML = '<div class="bell-empty">Aquí van a aparecer avisos cuando las salas que sigues se pongan en vivo.</div>';
    return;
  }
  el.innerHTML = notifData.items.map((n) => `
    <a class="bell-item bell-item-notif" href="/${encodeURIComponent(n.room_slug)}">
      ${n.creator_avatar ? `<img class="bell-item-avatar" src="${escapeHtml(n.creator_avatar)}">` : '<div class="bell-item-avatar"></div>'}
      <div class="bell-item-text">
        <div class="t">${escapeHtml(n.title)}</div>
        <div class="b">${escapeHtml(n.body)}</div>
      </div>
    </a>`).join('');
}

document.getElementById('btn-bell').onclick = async () => {
  const dropdown = document.getElementById('bell-dropdown');
  if (dropdown.classList.contains('show')) { dropdown.classList.remove('show'); return; }
  renderNotifDropdown();
  dropdown.classList.add('show');
  if (notifData.unread_count > 0) {
    await fetch('/api/notifications/read', { method: 'POST' });
    document.getElementById('bell-badge').classList.remove('show');
    notifData.unread_count = 0;
  }
};

// Transmitir y copiar link son las dos acciones que un creador necesita a la
// mano en todo momento — quedan fijas en la barra de arriba en vez de vivir
// solo en el monedero.
function setupNavShortcuts(slug) {
  const fullUrl = 'https://videoroom.live/' + slug;
  const transmitBtn = document.getElementById('btn-transmit-nav');
  transmitBtn.href = '/' + slug;
  transmitBtn.style.display = 'inline-block';
  const copyBtn = document.getElementById('btn-copy-link-nav');
  copyBtn.style.display = 'flex';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(fullUrl);
    showToast('🔗 Link copiado.');
  };
}

load();
loadUserChip();
loadNotifications();
setInterval(loadNotifications, 30000);
</script>
</body>
</html>
